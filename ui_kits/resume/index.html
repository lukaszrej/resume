<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Łukasz Rej — Frontend Developer</title>
  <link rel="icon" href="../../assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html {
      overflow-x: clip;
      scroll-behavior: smooth;
      scrollbar-width: thin;
      scrollbar-color: var(--color-border) transparent;
    }
    body { margin: 0; padding: 0; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 5px; }

    /* ── Gradient accent system ────────────────────────────── */
    :root { --grad: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%); }

    /* Direct h1 gradient — applies regardless of JSX cache state */
    h1 {
      background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%) !important;
      -webkit-background-clip: text !important;
      -webkit-text-fill-color: transparent !important;
      background-clip: text !important;
    }
    .dark  { --grad: linear-gradient(135deg, #60a5fa 0%, #818cf8 100%); }

    /* Gradient text (name, wordmark) */
    .grad-text {
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Gradient avatar border */
    .grad-border {
      padding: 2px;
      background: var(--grad);
      border-radius: 10px;
      display: inline-flex;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="./ResumeApp.jsx?v=3"></script>
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(window.ResumeApp)
    );
  </script>
</body>
</html>
